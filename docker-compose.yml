services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: discord_bot
      POSTGRES_USER: discord_bot
      POSTGRES_PASSWORD: discord_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord_bot -d discord_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  voicevox:
    image: voicevox/voicevox_engine:cpu-latest
    ports:
      - "50021:50021"
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: "2"
    # For 8GB hosts, consider lowering memory to 2g after monitoring.

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://discord_bot:discord_bot@postgres:5432/discord_bot
      REDIS_URL: redis://redis:6379
      VOICEVOX_URL: http://voicevox:50021
      PUBLIC_DASHBOARD_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      voicevox:
        condition: service_started
    profiles:
      - app

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://discord_bot:discord_bot@postgres:5432/discord_bot
      REDIS_URL: redis://redis:6379
      VOICEVOX_URL: http://voicevox:50021
      PUBLIC_DASHBOARD_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - app

volumes:
  postgres_data:
  redis_data:
