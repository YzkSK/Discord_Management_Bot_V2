services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: discord_bot
      POSTGRES_USER: discord_bot
      POSTGRES_PASSWORD: discord_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord_bot -d discord_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  voicevox:
    image: voicevox/voicevox_engine:cpu-latest
    ports:
      - "50021:50021"
    environment:
      VV_CPU_NUM_THREADS: ${VOICEVOX_CPU_NUM_THREADS:-6}
    deploy:
      resources:
        limits:
          memory: ${VOICEVOX_MEMORY_LIMIT:-3g}
          cpus: "${VOICEVOX_CPU_LIMIT:-6}"
    # For smaller hosts, lower VOICEVOX_CPU_NUM_THREADS and VOICEVOX_CPU_LIMIT after monitoring.

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://discord_bot:discord_bot@postgres:5432/discord_bot
      REDIS_URL: redis://redis:6379
      VOICEVOX_URL: http://voicevox:50021
      VOICEVOX_SPEAKER_ID: ${VOICEVOX_SPEAKER_ID:-2}
      PUBLIC_DASHBOARD_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      voicevox:
        condition: service_started
    profiles:
      - app

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://discord_bot:discord_bot@postgres:5432/discord_bot
      REDIS_URL: redis://redis:6379
      VOICEVOX_URL: http://voicevox:50021
      VOICEVOX_SPEAKER_ID: ${VOICEVOX_SPEAKER_ID:-2}
      PUBLIC_DASHBOARD_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - app

  backup:
    image: postgres:17-alpine
    environment:
      DATABASE_URL: postgres://discord_bot:discord_bot@postgres:5432/discord_bot
      BACKUP_DIR: /backups/postgres
    volumes:
      - ./scripts/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/usr/local/bin/backup-postgres.sh"]
    profiles:
      - maintenance

volumes:
  postgres_data:
  redis_data:
