services:
  bot:
    profiles: !reset []
    restart: unless-stopped
    environment:
      PUBLIC_DASHBOARD_URL: ${PUBLIC_DASHBOARD_URL:-https://example.com}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://example.com}

  dashboard:
    profiles: !reset []
    restart: unless-stopped
    ports: !reset []
    environment:
      PUBLIC_DASHBOARD_URL: ${PUBLIC_DASHBOARD_URL:-https://example.com}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://example.com}

  nginx:
    image: nginx:1.29-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dashboard:
        condition: service_started

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  voicevox:
    restart: unless-stopped

  backup:
    profiles:
      - maintenance
